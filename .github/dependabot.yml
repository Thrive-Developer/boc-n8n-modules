version: 2
updates:
  # Add one npm entry per module under /n8n-modules.
  - package-ecosystem: "npm"
    directory: "/n8n-modules/n8n-nodes-wazuh"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/n8n-modules/n8n-nodes-keloola-accounting"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/n8n-modules/n8n-nodes-keloola-accounting-saas"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/n8n-modules/n8n-nodes-keloola-projects"
    schedule:
      interval: "weekly"
    groups:
      minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
