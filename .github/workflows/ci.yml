name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs for the same branch/PR to avoid wasting CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - n8n-modules/n8n-nodes-wazuh
          - n8n-modules/n8n-nodes-keloola-accounting
          - n8n-modules/n8n-nodes-keloola-accounting-saas
          - n8n-modules/n8n-nodes-keloola-projects

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: ${{ matrix.module }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.module }}

      - name: Run lint
        run: npm run lint
        working-directory: ${{ matrix.module }}

      - name: Run build
        run: npm run build
        working-directory: ${{ matrix.module }}
        env:
          ACCOUNTING_BASE_URL: https://accounting.example.test
          AUTH_BASE_URL: https://auth.example.test
